<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prototypes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="password-gate.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', sans-serif;
      background: #25273A;
      color: #57534E;
      min-height: 100vh;
    }

    header {
      background: #f5f5f4;
      padding: 24px 40px;
    }

    header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #1C1917;
    }

    header p {
      margin-top: 4px;
      font-size: 14px;
      color: #78716c;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e7e5e4;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      border-color: #d6d3d1;
    }

    .card-thumbnail {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #e7e5e4;
      overflow: hidden;
      flex-shrink: 0;
    }

    .card-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-body {
      padding: 20px 20px 8px 20px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: #1c1917;
      line-height: 1.4;
    }

    .card-description {
      margin-top: 8px;
      font-size: 14px;
      color: #57534E;
      line-height: 1.6;
    }

    .card-review {
      margin-top: 10px;
      font-size: 12px;
      color: #57534E;
      line-height: 1.5;
    }

    .card-review-label {
      font-weight: 600;
    }

    .card-updated {
      margin-top: 8px;
      font-size: 11px;
      color: #57534E;
      line-height: 1.4;
      margin-bottom: 8px;
      flex: 1;
    }

    .card-footer {
      padding: 0 20px 20px;
    }

    .card-link {
      background: #0080C5;
      display: inline-block;
      font-size: 13px;
      font-weight: 500;
      color: #ffffff;
      text-decoration: none;
      padding: 7px 14px;
      border-radius: 4px;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .card-link:hover {
      background: #3399D1;
    }

    .card-link:active {
      background: #00669E;
    }
  </style>
</head>
<body>

  <!-- <header>
    <h1>Prototypes</h1>
    <p>Select a prototype below to view it.</p>
  </header> -->

  <main>
    <div class="grid">

      <!-- Add new prototype cards below this line -->


      <!-- Card: SMART Routing — Scheduling Grid -->
      <div class="card">
        <!-- <div class="card-thumbnail">
          <img src="screenshots/smart-routing-grid-scheduling.png" alt="SMART Routing Scheduling Grid screenshot" loading="lazy">
        </div> -->
        <div class="card-body">
          <div class="card-title">SMART Routing — Scheduling Grid</div>
          <div class="card-description">Order management grid for the new provider portal.</div>
          <div class="card-review"><span class="card-review-label">Areas to review:</span> filtering, column content, scheduling actions, assignment actions</div>
          <div class="card-updated">Last updated: 2026-06-15</div>
        </div>
        <div class="card-footer">
          <a
            class="card-link"
            href="smart-routing-grid-scheduling.html"
            data-prototype-title="SMART Routing — Scheduling Grid"
            data-prototype-password="employ-skip-pot-fault"
          >View prototype</a>
        </div>
      </div>

    </div>
  </main>

</body>
</html>
