<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMART Routing - Dispatch Grid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="smart-routing.css?v=2026-06-28k">
<meta name="prototype-title" content="SMART Routing — Dispatch Grid">
<meta name="prototype-password" content="lamp-govern-grave-return">
<meta name="prototype-back" content="index.html">
<script src="../password-gate.js?v=2026-06-18b"></script>
</head>
<body class="dispatch-layout" data-density="standard">
  <div class="table-settings">
    <div class="toolbar-row">
      <div class="toolbar-filters">
        <button class="icon-btn icon-btn--lg filter-toggle-btn" id="filterToggleBtn" aria-label="Filter"><span class="filter-dot"></span></button>
        <div class="quick-filters" id="quickFilters">
          <button class="filter-btn" data-filter="STAT / Urgent"><span class="filter-check"></span><span class="filter-label">STAT / Urgent</span><span class="count-badge">4</span></button>
          <button class="filter-btn" data-filter="SLA approaching"><span class="filter-check"></span><span class="filter-label">SLA approaching</span><span class="count-badge">6</span></button>
          <button class="filter-btn" data-filter="Missed schedule"><span class="filter-check"></span><span class="filter-label">Missed schedule</span><span class="count-badge">3</span></button>
          <button class="filter-btn" data-filter="Delayed"><span class="filter-check"></span><span class="filter-label">Delayed</span><span class="count-badge">1</span></button>
          <button class="filter-btn" data-filter="Rescheduled"><span class="filter-check"></span><span class="filter-label">Rescheduled</span><span class="count-badge">1</span></button>
          <button class="filter-btn" data-filter="New note"><span class="filter-check"></span><span class="filter-label">New note</span><span class="count-badge">3</span></button>
        </div>
      </div>
      <div class="table-actions">
        <button class="icon-btn icon-btn--lg action-btn" aria-label="Export"></button>
        <button class="icon-btn icon-btn--lg action-btn" aria-label="Customize columns"></button>
        <button class="icon-btn icon-btn--lg action-btn" id="settingsBtn" aria-label="Settings"></button>
      </div>
    </div>
    <div class="applied-filters" id="appliedFilters">
      <span class="filter-chip"><span class="chip-text"><span class="chip-label">Warehouse:</span> <span class="chip-value">Birmingham, AL</span></span><button class="chip-remove" aria-label="Remove filter"></button></span>
      <span class="filter-chip"><span class="chip-text"><span class="chip-label">Warehouse:</span> <span class="chip-value">Gadsden, AL</span></span><button class="chip-remove" aria-label="Remove filter"></button></span>
      <span class="filter-chip"><span class="chip-text"><span class="chip-label">Order status:</span> <span class="chip-value">Open</span></span><button class="chip-remove" aria-label="Remove filter"></button></span>
      <span class="filter-chip"><span class="chip-text"><span class="chip-label">Order status:</span> <span class="chip-value">Closed last 48 hours</span></span><button class="chip-remove" aria-label="Remove filter"></button></span>
      <span class="filter-chip"><span class="chip-text"><span class="chip-label">Schedule date:</span> <span class="chip-value">Today</span></span><button class="chip-remove" aria-label="Remove filter"></button></span>
      <span class="filter-chip"><span class="chip-text"><span class="chip-label">Schedule date:</span> <span class="chip-value">Tomorrow</span></span><button class="chip-remove" aria-label="Remove filter"></button></span>
    </div>
  </div>
  <div class="dispatch-grid-shell">
    <div class="data-grid" id="grid">
      <div class="grid-track">
        <div class="grid-header">
          <div class="header-cell col-select"><span class="checkbox" id="selectAll" role="checkbox" aria-checked="false" aria-label="Select all rows" tabindex="0"></span></div>
          <div class="header-cell col-address">Address</div>
          <div class="header-cell col-order">Order</div>
          <div class="header-cell col-priority">Priority / Reason</div>
          <div class="header-cell col-patient">Patient</div>
          <div class="header-cell col-scheduled">Scheduled</div>
          <div class="header-cell col-eta">ETA</div>
          <div class="header-cell col-completed">Completed</div>
          <div class="header-cell col-driver">Driver</div>
          <div class="header-cell col-route">Route</div>
          <div class="header-cell col-tags">Tags</div>
          <div class="header-cell col-actions"></div>
        </div>
        <div id="rows"></div>
      </div>
    </div>
    <aside class="route-snapshot-panel" aria-label="Route snapshot">
      <p class="route-snapshot-text">route snapshot</p>
    </aside>
  </div>

<script src="grid-data.js?v=2026-06-28c"></script>
<script src="grid.js?v=2026-06-28n"></script>
<script>
  SmartRoutingGrid.init({
    variant: 'dispatch',
    assigneeMode: 'search'
  });
</script>
</body>
</html>
