<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMART Routing - Purchasing and RT Grid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="smart-routing.css?v=2026-07-22f">
<meta name="prototype-title" content="SMART Routing - Purchasing and RT Grid">
<meta name="prototype-password" content="pave-rhythm-grove-modal">
<meta name="prototype-back" content="index.html">
<script src="../password-gate.js?v=2026-06-18b"></script>
</head>
<body class="purchasing-rt-layout" data-density="standard">
  <div class="table-settings">
    <div class="toolbar-row">
      <div class="toolbar-filters">
        <button class="icon-btn icon-btn--lg filter-toggle-btn" id="filterToggleBtn" aria-label="Filter"></button>
        <div class="quick-filters" id="quickFilters">
          <button class="filter-btn" data-filter="New note">
            <span class="filter-check"></span><span class="filter-label">New note</span><span class="count-badge">3</span>
          </button>
        </div>
      </div>
      <div class="table-actions">
        <button class="icon-btn icon-btn--lg action-btn" aria-label="Export"></button>
        <button class="icon-btn icon-btn--lg action-btn" id="historyBtn" aria-label="History"></button>
        <button class="icon-btn icon-btn--lg action-btn" aria-label="Customize columns"></button>
        <button class="icon-btn icon-btn--lg action-btn" id="settingsBtn" aria-label="Settings"></button>
      </div>
    </div>
    <div class="applied-filters" id="appliedFilters">
      <span class="filter-chip"><span class="chip-text"><span class="chip-label">Order status:</span> <span class="chip-value">Open</span></span><button class="chip-remove" aria-label="Remove filter"></button></span>
      <span class="filter-chip"><span class="chip-text"><span class="chip-label">Client:</span> <span class="chip-value">HarborLight Hospice Care</span></span><button class="chip-remove" aria-label="Remove filter"></button></span>
      <span class="filter-chip"><span class="chip-text"><span class="chip-label">Client:</span> <span class="chip-value">Big Heart Hospice &amp; Home Care</span></span><button class="chip-remove" aria-label="Remove filter"></button></span>
      <span class="filter-chip"><span class="chip-text"><span class="chip-label">Client:</span> <span class="chip-value">Comfort Home Health</span></span><button class="chip-remove" aria-label="Remove filter"></button></span>
    </div>
  </div>
  <div class="data-grid" id="grid">
    <div class="grid-track">
      <div class="grid-header">
        <div class="header-cell col-order">Order</div>
        <div class="header-cell col-patient">Patient</div>
        <div class="header-cell col-client">Client</div>
        <div class="header-cell col-ordered">Ordered</div>
        <div class="header-cell col-completed">Completed</div>
        <div class="header-cell col-tags">Tags</div>
        <div class="header-cell col-actions"></div>
      </div>
      <div id="rows"></div>
    </div>
  </div>

<script src="grid-data.js?v=2026-07-22d"></script>
<script src="grid.js?v=2026-07-22e"></script>
<script>
  SmartRoutingGrid.init({
    variant: 'purchasing-rt'
  });
</script>
</body>
</html>
