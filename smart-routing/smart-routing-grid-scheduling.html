  // Generic single-select editable grid cell. Reusable for any column.
  // config: { value, options:[], heading, ariaLabel, onChange(value) }
  // Tracks the currently-editing cell so only one is open at a time.
  const editableCells = new Set(); // each entry: { exitEdit }
  const openMenuPopovers = new Set(); // close() fns of currently-open menu popovers (only one open at a time)

  function setupEditableCell(cell, config) {
    let selected = config.value || null;
    let menuOpen = false;

    const api = { exitEdit: () => { if (cell.classList.contains('editing')) renderDisplay(); } };
    editableCells.add(api);

    function renderDisplay() {
      closeMenu();
      cell.classList.remove('editing', 'menu-open', 'cell-edit-active');
      menuOpen = false;
      cell.innerHTML = `
        <div class="cell-display">
          <span class="cell-display-text">${selected || ''}</span>
          <button class="icon-btn icon-btn--reveal edit-btn" aria-label="${config.ariaLabel || 'Edit'}">${ICON_PENCIL}</button>
        </div>`;
      cell.querySelector('.edit-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        enterEdit(true);
      });
    }

    function enterEdit(openMenu) {
      // close any other cell currently in edit mode (saves its value via its own renderDisplay)
      editableCells.forEach(other => { if (other !== api) other.exitEdit(); });
      cell.classList.add('editing', 'cell-edit-active');
      cell.innerHTML = `
        <div class="cell-field" tabindex="0">
          <span class="cell-field-value">${selected || ''}</span>
          <span class="cell-field-chevron">${ICON_COLLAPSE}</span>
        </div>`;
      cell.querySelector('.cell-field').addEventListener('click', (e) => {
        e.stopPropagation();
        menuOpen ? closeMenu() : openMenuList();
      });
      if (openMenu) openMenuList();
    }

    let menuEl = null;

    function positionMenu() {
      if (!menuEl) return;
      const field = cell.querySelector('.cell-field');
      if (!field) return;
      const r = field.getBoundingClientRect();
      menuEl.style.top = r.bottom + 'px';
      menuEl.style.left = r.left + 'px';
    }

    function openMenuList() {
      if (menuEl) return;
      menuEl = document.createElement('div');
      menuEl.className = 'cell-menu';
      menuEl.innerHTML = `
        ${config.heading ? `<div class="menu-heading">${config.heading}</div>` : ''}
        ${config.options.map(opt => {
          const label = typeof opt === 'string' ? opt : opt.label;
          const disabled = typeof opt === 'object' && opt.disabled;
          return `<div class="menu-option ${label === selected ? 'selected' : ''} ${disabled ? 'disabled' : ''}" ${disabled ? 'aria-disabled="true"' : 'tabindex="0"'} data-value="${label}">${label}</div>`;
        }).join('')}`;
      document.body.appendChild(menuEl);
      cell.classList.add('menu-open');
      menuOpen = true;
      positionMenu();
      window.addEventListener('scroll', positionMenu, true);
      window.addEventListener('resize', positionMenu);
      menuEl.querySelectorAll('.menu-option:not(.disabled)').forEach(o => {
        o.addEventListener('click', (e) => {
          e.stopPropagation();
          selected = o.dataset.value;
          if (config.onChange) config.onChange(selected);
          closeMenu();
          const val = cell.querySelector('.cell-field-value');
          if (val) { val.textContent = selected; }
        });
      });
    }

    function closeMenu() {
      if (menuEl) { menuEl.remove(); menuEl = null; }
      window.removeEventListener('scroll', positionMenu, true);
      window.removeEventListener('resize', positionMenu);
      cell.classList.remove('menu-open');
      menuOpen = false;
    }

    // click outside saves and reverts to text display (menu lives on body, so check it too)
    document.addEventListener('click', (e) => {
      if (cell.classList.contains('editing') && !cell.contains(e.target) && !(menuEl && menuEl.contains(e.target))) {
        renderDisplay();
      }
    });

    renderDisplay(); // initial render
  }

  // Tags edit cell: pencil on hover opens a checkbox popover (max-height scroll), Deselect all + Save.
  // Escape / outside-click closes WITHOUT saving. Active cell gets a blue outline.
  function setupTagCell(cell, row) {
    let popEl = null;
    let working = null; // working copy of selected tag names while editing

    function renderBadges() {
      const badgesEl = cell.querySelector('.badges');
      badgesEl.innerHTML = sortTags(row.tags).map(badge).join('');
    }

    function position() {
      if (!popEl) return;
      const r = cell.getBoundingClientRect();
      popEl.style.top = (r.bottom + 4) + 'px';
      let left = r.left;
      if (left + popEl.offsetWidth > window.innerWidth) left = window.innerWidth - popEl.offsetWidth;
      if (left < 0) left = 0;
      popEl.style.left = left + 'px';
    }

    function syncOption(o) {
      const on = working.includes(o.dataset.tag);
      o.classList.toggle('selected', on);
      o.querySelector('.tag-option-check').innerHTML = on ? ICON_CHECKBOX_ON : ICON_CHECKBOX_OFF;
    }

    function renderOptions() {
      const list = popEl.querySelector('.tag-list');
      list.innerHTML = ALL_TAGS.map(t => {
        const on = working.includes(t.t);
        return `<div class="tag-option ${on ? 'selected' : ''}" role="option" tabindex="0" data-tag="${t.t}">
          <span class="tag-option-check">${on ? ICON_CHECKBOX_ON : ICON_CHECKBOX_OFF}</span>
          <span class="tag-option-label">${t.t}</span>
        </div>`;
      }).join('');
      list.querySelectorAll('.tag-option').forEach(o => {
        o.addEventListener('click', () => {
          const tag = o.dataset.tag;
          const idx = working.indexOf(tag);
          if (idx >= 0) working.splice(idx, 1); else working.push(tag);
          syncOption(o); // update in place; do NOT rebuild (would detach the click target mid-event)
        });
      });
    }

    function syncAllOptions() {
      if (!popEl) return;
      popEl.querySelectorAll('.tag-option').forEach(syncOption);
    }

    function open() {
      if (popEl) return;
      // close any other editable cell (assignee) that's open
      editableCells.forEach(c => c.exitEdit());
      working = row.tags.map(t => t.t);
      popEl = document.createElement('div');
      popEl.className = 'tag-popover';
      popEl.innerHTML = `
        <div class="tag-search">
          <span class="tag-search-icon">${ICON_SEARCH}</span>
        </div>
        <div class="tag-list" role="listbox" aria-multiselectable="true"></div>
        <div class="tag-buttons">
          <button class="filter-btn-reset tag-deselect">Deselect all</button>
          <button class="filter-btn-apply tag-save">Save</button>
        </div>`;
      document.body.appendChild(popEl);
      cell.classList.add('cell-edit-active');
      renderOptions();
      position();
      window.addEventListener('scroll', position, true);
      window.addEventListener('resize', position);
      popEl.querySelector('.tag-deselect').addEventListener('click', (e) => {
        e.stopPropagation();
        working = [];
        syncAllOptions();
      });
      popEl.querySelector('.tag-save').addEventListener('click', (e) => {
        e.stopPropagation();
        row.tags = ALL_TAGS.filter(t => working.includes(t.t)).map(t => ({ t: t.t, v: t.v }));
        renderBadges();
        close();
      });
    }

    function close() {
      if (popEl) { popEl.remove(); popEl = null; }
      window.removeEventListener('scroll', position, true);
      window.removeEventListener('resize', position);
      cell.classList.remove('cell-edit-active');
    }

    cell.querySelector('.tags-edit-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      popEl ? close() : open();
    });
    document.addEventListener('click', (e) => {
      if (popEl && !popEl.contains(e.target) && !cell.contains(e.target)) close();
    });
    document.addEventListener('keydown', (e) => {
      if (popEl && e.key === 'Escape') close();
    });
  }

  const FILTER_PREDICATES = {
    'STAT/Urgent': (r) => r.priority === 'STAT' || r.priority === 'Urgent',
    'New Note':    (r) => r.note === true,
    'Rescheduled': (r) => r.status && r.status.t === 'Rescheduled',
  };

  function applyFilter(activeFilter) {
    const pred = activeFilter ? FILTER_PREDICATES[activeFilter] : null;
    rowEls.forEach(el => {
      el.style.display = (!pred || pred(el._data)) ? '' : 'none';
    });
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const wasActive = btn.classList.contains('active');
      // mutually exclusive: clear all, then activate this one unless it was already active (toggle off)
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      if (!wasActive) btn.classList.add('active');
      const active = document.querySelector('.filter-btn.active');
      applyFilter(active ? active.dataset.filter : null);
    });
  });

  // initial state: STAT/Urgent starts active in the markup, so apply it
  (function initFilter(){
    const active = document.querySelector('.filter-btn.active');
    if (active) applyFilter(active.dataset.filter);
  })();

  // ---- Generic anchored menu popover (reuses .cell-menu / .menu-heading / .menu-option styling) ----
  // config: { heading, options:[], selected, align ('left'|'right'), onSelect(value) }
  // Pass `selected` for a single-select menu (tracks + highlights the chosen option, e.g. row
  // density). Omit it for a command menu (Schedule/Reset/View equipment) — clicking invokes the
  // action without leaving a persistent .selected highlight.
  function setupMenuPopover(trigger, config) {
    const selectable = 'selected' in config;
    let menuEl = null;
    let selected = config.selected || null;

    function positionMenu() {
      if (!menuEl) return;
      const r = trigger.getBoundingClientRect();
      menuEl.style.top = (r.bottom + 4) + 'px';
      if (config.align === 'right') {
        menuEl.style.left = (r.right - menuEl.offsetWidth) + 'px';
      } else {
        menuEl.style.left = r.left + 'px';
      }
    }

    function open() {
      if (menuEl) return;
      openMenuPopovers.forEach(closeOther => closeOther()); // only one menu popover open at a time
      menuEl = document.createElement('div');
      menuEl.className = 'cell-menu menu-popover';
      menuEl.innerHTML = `
        ${config.heading ? `<div class="menu-heading">${config.heading}</div>` : ''}
        ${config.options.map(opt =>
          `<div class="menu-option ${selectable && opt === selected ? 'selected' : ''}" tabindex="0" data-value="${opt}">${opt}</div>`
        ).join('')}`;
      document.body.appendChild(menuEl);
      trigger.classList.add('active');
      openMenuPopovers.add(close);
      positionMenu();
      window.addEventListener('scroll', positionMenu, true);
      window.addEventListener('resize', positionMenu);
      menuEl.querySelectorAll('.menu-option').forEach(o => {
        o.addEventListener('click', (e) => {
          e.stopPropagation();
          const value = o.dataset.value;
          if (selectable) selected = value;
          if (config.onSelect) config.onSelect(value);
          close();
        });
      });
    }

    function close() {
      if (menuEl) { menuEl.remove(); menuEl = null; }
      openMenuPopovers.delete(close);
      window.removeEventListener('scroll', positionMenu, true);
      window.removeEventListener('resize', positionMenu);
      trigger.classList.remove('active');
    }

    trigger.addEventListener('click', (e) => {
      e.stopPropagation();
      menuEl ? close() : open();
    });
    document.addEventListener('click', (e) => {
      if (menuEl && !menuEl.contains(e.target) && e.target !== trigger) close();
    });
  }

  setupMenuPopover(document.getElementById('settingsBtn'), {
    heading: 'Row density',
    options: ['Condensed', 'Standard', 'Relaxed'],
    selected: 'Standard',
    align: 'right',
    onSelect: (value) => { document.body.dataset.density = value.toLowerCase(); }
  });

  // ---- Side sheet (slides in from the right; heading is the order ID) ----
  // Static equipment content — same for every order row for now.
  const SIDE_SHEET_BODY = `
    <div class="equipment-group">
      <div class="equipment-group-heading">Delivery (3)</div>
      <div class="equipment-list">
        <div class="equipment-card"><div class="equipment-item"><span class="equipment-name">Over bed table</span><span class="equipment-qty">1</span></div></div>
        <div class="equipment-card"><div class="equipment-item"><span class="equipment-name">Bed full-electric</span><span class="equipment-qty">1</span></div></div>
        <div class="equipment-card"><div class="equipment-item"><span class="equipment-name">O2 Cylinder</span><span class="equipment-qty">12</span></div></div>
      </div>
    </div>
    <div class="equipment-group">
      <div class="equipment-group-heading">Pick up (1)</div>
      <div class="equipment-list">
        <div class="equipment-card"><div class="equipment-item"><span class="equipment-name">Bed full-electric</span><span class="equipment-qty">1</span></div></div>
      </div>
    </div>
    <div class="equipment-group">
      <div class="equipment-group-heading">Service (1)</div>
      <div class="equipment-list">
        <div class="equipment-card">
          <div class="equipment-item"><span class="equipment-name">Hoyer lift</span></div>
          <div class="equipment-detail"><span class="equipment-detail-label">Service reason:</span><span class="equipment-detail-value">Equipment does not power on</span></div>
          <div class="equipment-detail"><span class="equipment-detail-label">Service details:</span><span class="equipment-detail-value">light blinks once then goes out</span></div>
        </div>
      </div>
    </div>
    <div class="side-sheet-actions">
      <button class="btn-secondary" type="button">View order<span class="btn-icon-end">${ICON_EXTERNAL}</span></button>
    </div>`;

  let sheetEl = null;
  function openSideSheet(orderId) {
    if (sheetEl) sheetEl.remove();        // replace any open sheet immediately
    sheetEl = document.createElement('div');
    sheetEl.className = 'side-sheet';
    sheetEl.innerHTML = `
      <div class="side-sheet-header">
        <div class="side-sheet-title">Order #${orderId}</div>
        <button class="icon-btn side-sheet-close" aria-label="Close">${ICON_CLOSE}</button>
      </div>
      <div class="side-sheet-body">${SIDE_SHEET_BODY}</div>`;
    document.body.appendChild(sheetEl);
    void sheetEl.offsetWidth;             // force reflow so the slide-in transition runs
    sheetEl.classList.add('open');
    sheetEl.querySelector('.side-sheet-close').addEventListener('click', closeSideSheet);
  }
  function closeSideSheet() {
    if (!sheetEl) return;
    const el = sheetEl;
    sheetEl = null;
    el.classList.remove('open');          // slide out, then remove after the transition
    el.addEventListener('transitionend', () => el.remove(), { once: true });
  }
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSideSheet(); });

  // ---- History popover (My Recent Orders) ----
  const RECENT_ORDERS = [
    { type: 'Delivery', id: '#123455789', patient: 'John Smith',     client: 'HarborLight Hospice Care - HarborLight Hospice Care - Birmingham' },
    { type: 'Pickup',   id: '#123455123', patient: 'Emily Johnson',  client: 'Big Heart Hospice & Home Care - Big Heart Birmingham' },
    { type: 'Pickup',   id: '#123455456', patient: 'Michael Brown',  client: 'Big Heart Hospice & Home Care - Big Heart Gadsden' },
    { type: 'Delivery', id: '#123455234', patient: 'Sarah Davis',    client: 'Big Heart Hospice & Home Care - Big Heart Gadsden' },
    { type: 'Delivery', id: '#123455678', patient: 'David Wilson',   client: 'Comfort Home Health - Trussville, AL' },
  ];

  (function setupHistoryPopover() {
    const trigger = document.getElementById('historyBtn');
    let popEl = null;

    function position() {
      if (!popEl) return;
      const r = trigger.getBoundingClientRect();
      popEl.style.top = (r.bottom + 4) + 'px';
      // center the popover on the trigger; only clamp if it would actually leave the viewport
      let left = r.left + r.width / 2 - popEl.offsetWidth / 2;
      if (left < 0) left = 0;
      else if (left + popEl.offsetWidth > window.innerWidth) left = window.innerWidth - popEl.offsetWidth;
      popEl.style.left = left + 'px';
    }

    function open() {
      if (popEl) return;
      popEl = document.createElement('div');
      popEl.className = 'history-popover';
      popEl.innerHTML = `
        <div class="history-heading">My Recent Orders</div>
        <div class="history-list">
          ${RECENT_ORDERS.map(o => `
            <div class="history-order">
              <div class="history-order-line">
                <span class="history-order-type">${o.type}</span>
                <span class="link history-order-id" tabindex="0">${o.id}</span>
              </div>
              <span class="link" tabindex="0">${o.patient}</span>
              <span class="history-client">${o.client}</span>
            </div>`).join('')}
        </div>`;
      document.body.appendChild(popEl);
      trigger.classList.add('active');
      position();
      window.addEventListener('scroll', position, true);
      window.addEventListener('resize', position);
    }

    function close() {
      if (popEl) { popEl.remove(); popEl = null; }
      window.removeEventListener('scroll', position, true);
      window.removeEventListener('resize', position);
      trigger.classList.remove('active');
    }

    trigger.addEventListener('click', (e) => { e.stopPropagation(); popEl ? close() : open(); });
    document.addEventListener('click', (e) => {
      if (popEl && !popEl.contains(e.target) && e.target !== trigger) close();
    });
  })();

  // ---- Filter popover (scheduling filters) ----
  (function setupFilterPopover() {
    const trigger = document.getElementById('filterToggleBtn');
    let popEl = null;

    // input field with optional search adornment and pre-filled chips.
    // removable: chips show a remove (✕) button (individual selections, e.g. schedule
    // status). Omit for summary chips like "2 warehouses selected" (no remove button).
    function field(label, { search = false, chips = [], required = false, removable = false } = {}) {
      const chipHtml = chips.map(c =>
        `<span class="filter-chip">${c}${removable ? '<button class="chip-remove">' + ICON_CHIP_REMOVE + '</button>' : ''}</span>`
      ).join('');
      return `
        <div class="filter-field">
          <span class="filter-field-label">${label}${required ? ' <span class="req">*</span>' : ''}</span>
          <div class="filter-input">
            ${search ? `<span class="filter-input-search">${ICON_SEARCH}</span>` : ''}
            <span class="filter-input-content">${chipHtml}</span>
            <span class="filter-input-chevron">${ICON_CHEVRON_DOWN}</span>
          </div>
        </div>`;
    }

    function position() {
      if (!popEl) return;
      const r = trigger.getBoundingClientRect();
      popEl.style.top = (r.bottom + 4) + 'px';
      // left-aligned to the trigger, clamped only to prevent true off-screen overflow
      let left = r.left;
      if (left + popEl.offsetWidth > window.innerWidth) left = window.innerWidth - popEl.offsetWidth;
      if (left < 0) left = 0;
      popEl.style.left = left + 'px';
    }

    function open() {
      if (popEl) return;
      popEl = document.createElement('div');
      popEl.className = 'filter-popover';
      popEl.innerHTML = `
        ${field('Warehouses', { search: true, chips: ['2 warehouses selected'] })}
        ${field('Order type')}
        ${field('Order priority')}
        ${field('Order reason')}
        ${field('Schedule status', { chips: ['Patient Scheduling', 'Patient Approval', 'Provider Review', 'Escalated', 'Rescheduled'], removable: true })}
        ${field('Tags')}
        <div class="filter-field">
          <span class="filter-field-label">Assigned to <span class="req">*</span></span>
          <div class="filter-chips-row">
            <button class="filter-chip-toggle"><span class="chip-check">${ICON_CHECK}</span>Me</button>
            <button class="filter-chip-toggle"><span class="chip-check">${ICON_CHECK}</span>Unassigned</button>
          </div>
        </div>
        <div class="filter-buttons">
          <button class="filter-btn-reset">Reset</button>
          <button class="filter-btn-apply">Filter</button>
        </div>`;
      document.body.appendChild(popEl);
      trigger.classList.add('active');
      position();
      window.addEventListener('scroll', position, true);
      window.addEventListener('resize', position);
    }

    function close() {
      if (popEl) { popEl.remove(); popEl = null; }
      window.removeEventListener('scroll', position, true);
      window.removeEventListener('resize', position);
      trigger.classList.remove('active');
    }

    trigger.addEventListener('click', (e) => { e.stopPropagation(); popEl ? close() : open(); });
    document.addEventListener('click', (e) => {
      if (popEl && !popEl.contains(e.target) && e.target !== trigger) close();
    });
  })();

</script>
</body>
</html>
